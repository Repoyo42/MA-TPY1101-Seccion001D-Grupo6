<div class="login-page">
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <section class="login-card">
    <div class="icon-row">
      <div class="moon"></div>
      <div class="star star-one">✦</div>
      <div class="star star-two">✧</div>
    </div>

    <h1>Perfil profesional</h1>
    <p class="subtitle">Completa tu información de tarotista</p>

    <p *ngIf="user" class="register-text">
      Hola, <strong>{{ user.nombre }}</strong>
    </p>

    <div class="login-form">
      <label for="descripcion">Descripción</label>
      <textarea
        id="descripcion"
        [(ngModel)]="descripcion"
        placeholder="Cuéntales a tus clientes cómo trabajas..."
        rows="6"
      ></textarea>

      <label for="precioBase">Precio base</label>
      <input
        id="precioBase"
        type="number"
        [(ngModel)]="precioBase"
        placeholder="Ej: 15000"
      />

      <button type="button" (click)="guardarPerfil()" [disabled]="loading">
        {{ loading ? 'Guardando...' : 'Guardar perfil' }}
      </button>
    </div>

    <p *ngIf="error" class="error-message">{{ error }}</p>
    <p *ngIf="success" class="success-message">{{ success }}</p>
  </section>
</div>
