<!-- Admin -->
<line x1="1280" y1="300" x2="1100" y2="130" stroke="#e8c3ff" stroke-width="1"/>
<line x1="1280" y1="310" x2="1100" y2="200" stroke="#e8c3ff" stroke-width="1"/>
