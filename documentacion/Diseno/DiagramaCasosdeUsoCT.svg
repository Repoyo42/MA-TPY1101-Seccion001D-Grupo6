<line x1="120" y1="380" x2="340" y2="760" stroke="#e8c3ff" stroke-width="1"/>
<line x1="120" y1="290" x2="340" y2="130" stroke="#e8c3ff" stroke-width="1"/>

<!-- Tarotista -->
