<div class="login-page">

  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <section class="login-card">

    <div class="icon-row">
      <div class="moon"></div>
      <div class="star star-one">✦</div>
      <div class="star star-two">✧</div>
    </div>

    <h1>Registro</h1>

    <p class="subtitle">
      Crea tu cuenta en Conecta Tarot
    </p>

    <div class="login-form">

      <label>Nombre</label>

      <input
        type="text"
        [(ngModel)]="nombre"
        placeholder="Tu nombre"
      />

      <label>Email</label>

      <input
        type="email"
        [(ngModel)]="email"
        placeholder="tu@email.com"
      />

      <label>Contraseña</label>

      <div class="password-wrapper">

        <input
          [type]="showPassword ? 'text' : 'password'"
          [(ngModel)]="password"
          placeholder="••••••••"
        />

        <button
          type="button"
          class="toggle-password"
          (click)="togglePassword()"
        >
          {{ showPassword ? 'Ocultar' : 'Mostrar' }}
        </button>

      </div>

      <button (click)="register()">
        Registrarse
      </button>

    </div>

    <p *ngIf="error" class="error-message">
      {{ error }}
    </p>

    <p *ngIf="success" class="success-message">
      {{ success }}
    </p>

    <p class="register-text">
      ¿Ya tienes cuenta?
    </p>

    <a routerLink="/login" class="register-link">
      Iniciar sesión
    </a>

  </section>

</div>
