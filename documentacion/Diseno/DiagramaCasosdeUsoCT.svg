<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" width="1400" height="900" font-family="Arial, sans-serif">
<rect width="1400" height="900" fill="#1a0a2e"/>
<text x="700" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#d4aaff">Diagrama de Casos de Uso - ConectaTarot</text>

<!-- Sistema boundary -->
<rect x="220" y="60" width="960" height="820" rx="16" fill="none" stroke="#9b59b6" stroke-width="2" stroke-dasharray="10,4"/>
<text x="700" y="88" text-anchor="middle" font-size="14" fill="#9b59b6">Sistema ConectaTarot</text>

<!-- ACTORES -->
<!-- Cliente -->
<ellipse cx="90" cy="300" rx="30" ry="40" fill="none" stroke="#d4aaff" stroke-width="2"/>
<line x1="90" y1="340" x2="90" y2="410" stroke="#d4aaff" stroke-width="2"/>
<line x1="90" y1="365" x2="55" y2="390" stroke="#d4aaff" stroke-width="2"/>
<line x1="90" y1="365" x2="125" y2="390" stroke="#d4aaff" stroke-width="2"/>
<line x1="90" y1="410" x2="60" y2="450" stroke="#d4aaff" stroke-width="2"/>
<line x1="90" y1="410" x2="120" y2="450" stroke="#d4aaff" stroke-width="2"/>
<text x="90" y="470" text-anchor="middle" font-size="13" font-weight="bold" fill="#d4aaff">Cliente</text>

<!-- Tarotista -->
<ellipse cx="90" cy="620" rx="30" ry="40" fill="none" stroke="#d4aaff" stroke-width="2"/>
<line x1="90" y1="660" x2="90" y2="730" stroke="#d4aaff" stroke-width="2"/>
<line x1="90" y1="685" x2="55" y2="710" stroke="#d4aaff" stroke-width="2"/>
<line x1="90" y1="685" x2="125" y2="710" stroke="#d4aaff" stroke-width="2"/>
<line x1="90" y1="730" x2="60" y2="770" stroke="#d4aaff" stroke-width="2"/>
<line x1="90" y1="730" x2="120" y2="770" stroke="#d4aaff" stroke-width="2"/>
<text x="90" y="790" text-anchor="middle" font-size="13" font-weight="bold" fill="#d4aaff">Tarotista</text>

<!-- Admin -->
<ellipse cx="1310" cy="300" rx="30" ry="40" fill="none" stroke="#d4aaff" stroke-width="2"/>
<line x1="1310" y1="340" x2="1310" y2="410" stroke="#d4aaff" stroke-width="2"/>
<line x1="1310" y1="365" x2="1275" y2="390" stroke="#d4aaff" stroke-width="2"/>
<line x1="1310" y1="365" x2="1345" y2="390" stroke="#d4aaff" stroke-width="2"/>
<line x1="1310" y1="410" x2="1280" y2="450" stroke="#d4aaff" stroke-width="2"/>
<line x1="1310" y1="410" x2="1340" y2="450" stroke="#d4aaff" stroke-width="2"/>
<text x="1310" y="470" text-anchor="middle" font-size="13" font-weight="bold" fill="#d4aaff">Admin</text>

<!-- Sistema Externo Webpay -->
<ellipse cx="1310" cy="620" rx="30" ry="40" fill="none" stroke="#c080ff" stroke-width="2" stroke-dasharray="5,3"/>
<line x1="1310" y1="660" x2="1310" y2="730" stroke="#c080ff" stroke-width="2" stroke-dasharray="5,3"/>
<line x1="1310" y1="685" x2="1275" y2="710" stroke="#c080ff" stroke-width="2" stroke-dasharray="5,3"/>
<line x1="1310" y1="685" x2="1345" y2="710" stroke="#c080ff" stroke-width="2" stroke-dasharray="5,3"/>
<line x1="1310" y1="730" x2="1280" y2="770" stroke="#c080ff" stroke-width="2" stroke-dasharray="5,3"/>
<line x1="1310" y1="730" x2="1340" y2="770" stroke="#c080ff" stroke-width="2" stroke-dasharray="5,3"/>
<text x="1310" y="790" text-anchor="middle" font-size="13" font-weight="bold" fill="#c080ff">Webpay</text>
<text x="1310" y="806" text-anchor="middle" font-size="11" fill="#c080ff">(sistema externo)</text>

<!-- CASOS DE USO -->
<!-- Columna izquierda - Cliente -->
<ellipse cx="450" cy="130" rx="110" ry="28" fill="#2d1654" stroke="#9b59b6" stroke-width="1.5"/>
<text x="450" y="135" text-anchor="middle" font-size="12" fill="#fff">Registrarse</text>

<ellipse cx="450" cy="200" rx="110" ry="28" fill="#2d1654" stroke="#9b59b6" stroke-width="1.5"/>
<text x="450" y="205" text-anchor="middle" font-size="12" fill="#fff">Iniciar sesion</text>

<ellipse cx="450" cy="270" rx="110" ry="28" fill="#2d1654" stroke="#9b59b6" stroke-width="1.5"/>
<text x="450" y="275" text-anchor="middle" font-size="12" fill="#fff">Ver perfil</text>

<ellipse cx="450" cy="340" rx="110" ry="28" fill="#2d1654" stroke="#9b59b6" stroke-width="1.5"/>
<text x="450" y="345" text-anchor="middle" font-size="12" fill="#fff">Editar perfil</text>

<ellipse cx="450" cy="410" rx="120" ry="28" fill="#2d1654" stroke="#9b59b6" stroke-width="1.5"/>
<text x="450" y="415" text-anchor="middle" font-size="12" fill="#fff">Buscar tarotistas</text>

<ellipse cx="450" cy="480" rx="120" ry="28" fill="#2d1654" stroke="#9b59b6" stroke-width="1.5"/>
<text x="450" y="485" text-anchor="middle" font-size="12" fill="#fff">Agendar sesion</text>

<ellipse cx="450" cy="550" rx="120" ry="28" fill="#2d1654" stroke="#9b59b6" stroke-width="1.5"/>
<text x="450" y="555" text-anchor="middle" font-size="12" fill="#fff">Cancelar sesion</text>

<ellipse cx="450" cy="620" rx="120" ry="28" fill="#2d1654" stroke="#9b59b6" stroke-width="1.5"/>
<text x="450" y="625" text-anchor="middle" font-size="12" fill="#fff">Ver mis sesiones</text>

<ellipse cx="450" cy="690" rx="110" ry="28" fill="#2d1654" stroke="#9b59b6" stroke-width="1.5"/>
<text x="450" y="695" text-anchor="middle" font-size="12" fill="#fff">Realizar pago</text>

<ellipse cx="450" cy="760" rx="140" ry="28" fill="#2d1654" stroke="#9b59b6" stroke-width="1.5"/>
<text x="450" y="765" text-anchor="middle" font-size="12" fill="#fff">Recuperar contrasena</text>

<!-- Columna centro - Tarotista -->
<ellipse cx="700" cy="550" rx="130" ry="28" fill="#2d1654" stroke="#9b59b6" stroke-width="1.5"/>
<text x="700" y="555" text-anchor="middle" font-size="12" fill="#fff">Gestionar disponibilidad</text>

<ellipse cx="700" cy="620" rx="130" ry="28" fill="#2d1654" stroke="#9b59b6" stroke-width="1.5"/>
<text x="700" y="625" text-anchor="middle" font-size="12" fill="#fff">Confirmar/Rechazar sesion</text>

<ellipse cx="700" cy="690" rx="130" ry="28" fill="#2d1654" stroke="#9b59b6" stroke-width="1.5"/>
<text x="700" y="695" text-anchor="middle" font-size="12" fill="#fff">Actualizar perfil profesional</text>

<ellipse cx="700" cy="760" rx="130" ry="28" fill="#2d1654" stroke="#9b59b6" stroke-width="1.5"/>
<text x="700" y="765" text-anchor="middle" font-size="12" fill="#fff">Ver agenda de sesiones</text>

<!-- Columna derecha - Admin -->
<ellipse cx="970" cy="130" rx="130" ry="28" fill="#2d1654" stroke="#9b59b6" stroke-width="1.5"/>
<text x="970" y="135" text-anchor="middle" font-size="12" fill="#fff">Gestionar usuarios</text>

<ellipse cx="970" cy="200" rx="130" ry="28" fill="#2d1654" stroke="#9b59b6" stroke-width="1.5"/>
<text x="970" y="205" text-anchor="middle" font-size="12" fill="#fff">Aprobar/Rechazar tarotista</text>

<ellipse cx="970" cy="270" rx="130" ry="28" fill="#2d1654" stroke="#9b59b6" stroke-width="1.5"/>
<text x="970" y="275" text-anchor="middle" font-size="12" fill="#fff">Gestionar especialidades</text>

<ellipse cx="970" cy="340" rx="130" ry="28" fill="#2d1654" stroke="#9b59b6" stroke-width="1.5"/>
<text x="970" y="345" text-anchor="middle" font-size="12" fill="#fff">Eliminar tarotista</text>

<ellipse cx="970" cy="410" rx="130" ry="28" fill="#2d1654" stroke="#9b59b6" stroke-width="1.5"/>
<text x="970" y="415" text-anchor="middle" font-size="12" fill="#fff">Ver reportes financieros</text>

<ellipse cx="970" cy="480" rx="130" ry="28" fill="#2d1654" stroke="#9b59b6" stroke-width="1.5"/>
<text x="970" y="485" text-anchor="middle" font-size="12" fill="#fff">Ver logs del sistema</text>

<!-- Webpay -->
<ellipse cx="970" cy="690" rx="130" ry="28" fill="#3d1a6d" stroke="#c080ff" stroke-width="1.5"/>
<text x="970" y="695" text-anchor="middle" font-size="12" fill="#e0c0ff">Procesar pago Webpay</text>

<!-- LINEAS ACTOR-CASO DE USO -->
<!-- Cliente -->
<line x1="120" y1="300" x2="340" y2="200" stroke="#e8c3ff" stroke-width="1"/>
<line x1="120" y1="310" x2="340" y2="270" stroke="#e8c3ff" stroke-width="1"/>
