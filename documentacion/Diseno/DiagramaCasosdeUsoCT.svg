<line x1="1280" y1="330" x2="1100" y2="340" stroke="#e8c3ff" stroke-width="1"/>
<line x1="1280" y1="340" x2="1100" y2="410" stroke="#e8c3ff" stroke-width="1"/>
<line x1="1280" y1="350" x2="1100" y2="480" stroke="#e8c3ff" stroke-width="1"/>

<!-- Webpay externo -->
<line x1="1280" y1="650" x2="1100" y2="690" stroke="#c080ff" stroke-width="1" stroke-dasharray="5,3"/>

<!-- include entre agendar y pago -->
<line x1="570" y1="480" x2="840" y2="690" stroke="#c0a0ff" stroke-width="1" stroke-dasharray="6,3"/>
