<div class="cliente-page">

  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <header class="topbar">

    <h1 class="logo">
      🔮 Conecta Tarot
    </h1>

    <div class="menu-container">

      <button
        class="menu-button"
        (click)="toggleMenu()"
      >
        ☰
      </button>

      <div
        class="dropdown-menu"
        *ngIf="menuOpen"
      >

        <p class="menu-user">
          {{ user?.nombre }}
        </p>

        <p class="menu-email">
          {{ user?.email }}
        </p>

        <hr>

        <button
          class="menu-action"
          routerLink="/registro-tarotista"
        >
          Convertirme en tarotista
        </button>

        <button
          class="logout-button"
          (click)="logout()"
        >
          Cerrar sesión
        </button>

      </div>

    </div>

  </header>

  <main class="content">

    <section class="welcome-card">

      <h2>
        Bienvenido
      </h2>

      <p class="welcome-name">
        {{ user?.nombre }}
      </p>

      <p class="welcome-text">
        Explora tarotistas y descubre tu destino.
      </p>

    </section>

  </main>

</div>
