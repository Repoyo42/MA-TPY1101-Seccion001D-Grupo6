<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" font-family="Arial, sans-serif">
  <rect width="1200" height="900" fill="#1a0a2e"/>

  <text x="600" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#d4aaff">Diagrama de Flujo — Procesos Principales ConectaTarot</text>

  <!-- ========= FLUJO 1: REGISTRO Y LOGIN ========= -->
  <text x="200" y="68" text-anchor="middle" font-size="14" font-weight="bold" fill="#e8c3ff">Flujo 1: Registro y Autenticación</text>

  <!-- Inicio -->
  <ellipse cx="200" cy="100" rx="70" ry="22" fill="#7d3cae" stroke="#d4aaff" stroke-width="1.5"/>
  <text x="200" y="105" text-anchor="middle" font-size="13" fill="#fff">Inicio</text>

  <line x1="200" y1="122" x2="200" y2="148" stroke="#d4aaff" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- POST /api/usuarios -->
  <rect x="110" y="148" width="180" height="44" rx="8" fill="#2d1654" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="200" y="166" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">POST /api/usuarios</text>
  <text x="200" y="182" text-anchor="middle" font-size="11" fill="#d4aaff">Envío de datos</text>

  <line x1="200" y1="192" x2="200" y2="218" stroke="#d4aaff" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Decisión: email único? -->
  <polygon points="200,218 270,248 200,278 130,248" fill="#1f0e3d" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="200" y="252" text-anchor="middle" font-size="11" fill="#d4aaff">¿Email único?</text>

  <!-- No -->
  <line x1="130" y1="248" x2="60" y2="248" stroke="#e06060" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="95" y="240" text-anchor="middle" font-size="11" fill="#e06060">No</text>
  <rect x="10" y="230" width="50" height="36" rx="8" fill="#3d1010" stroke="#e06060" stroke-width="1.5"/>
  <text x="35" y="249" text-anchor="middle" font-size="11" fill="#ff9090">409</text>
  <text x="35" y="263" text-anchor="middle" font-size="10" fill="#ff9090">Conflict</text>

  <!-- Si -->
  <line x1="200" y1="278" x2="200" y2="304" stroke="#60e090" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="212" y="295" font-size="11" fill="#60e090">Si</text>

  <!-- Hash BCrypt -->
  <rect x="110" y="304" width="180" height="44" rx="8" fill="#2d1654" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="200" y="322" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Hash BCrypt</text>
  <text x="200" y="338" text-anchor="middle" font-size="11" fill="#d4aaff">Cifrado de contraseña</text>

  <line x1="200" y1="348" x2="200" y2="374" stroke="#d4aaff" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Guardar en DB -->
  <rect x="110" y="374" width="180" height="44" rx="8" fill="#2d1654" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="200" y="392" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Guardar en DB</text>
  <text x="200" y="408" text-anchor="middle" font-size="11" fill="#d4aaff">Rol: CLIENTE asignado</text>

  <line x1="200" y1="418" x2="200" y2="444" stroke="#d4aaff" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 201 Created -->
  <rect x="110" y="444" width="180" height="44" rx="8" fill="#1a3d1a" stroke="#60e090" stroke-width="1.5"/>
  <text x="200" y="462" text-anchor="middle" font-size="12" font-weight="bold" fill="#60e090">201 Created</text>
  <text x="200" y="478" text-anchor="middle" font-size="11" fill="#90d090">Usuario + rol retornado</text>

  <line x1="200" y1="488" x2="200" y2="514" stroke="#d4aaff" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- POST login -->
  <rect x="110" y="514" width="180" height="44" rx="8" fill="#2d1654" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="200" y="532" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">POST /api/auth/login</text>
  <text x="200" y="548" text-anchor="middle" font-size="11" fill="#d4aaff">Email + password</text>

  <line x1="200" y1="558" x2="200" y2="584" stroke="#d4aaff" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Decisión credenciales -->
  <polygon points="200,584 270,614 200,644 130,614" fill="#1f0e3d" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="200" y="618" text-anchor="middle" font-size="11" fill="#d4aaff">¿Credenciales OK?</text>

  <line x1="200" y1="644" x2="200" y2="670" stroke="#60e090" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="212" y="661" font-size="11" fill="#60e090">Si</text>

  <!-- JWT -->
  <rect x="110" y="670" width="180" height="44" rx="8" fill="#1a3d1a" stroke="#60e090" stroke-width="1.5"/>
  <text x="200" y="688" text-anchor="middle" font-size="12" font-weight="bold" fill="#60e090">200 OK + JWT Token</text>
  <text x="200" y="704" text-anchor="middle" font-size="11" fill="#90d090">Acceso al sistema</text>

  <!-- No credenciales -->
  <line x1="270" y1="614" x2="340" y2="614" stroke="#e06060" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="305" y="606" text-anchor="middle" font-size="11" fill="#e06060">No</text>
  <rect x="340" y="596" width="70" height="36" rx="8" fill="#3d1010" stroke="#e06060" stroke-width="1.5"/>
  <text x="375" y="615" text-anchor="middle" font-size="11" fill="#ff9090">400</text>
  <text x="375" y="629" text-anchor="middle" font-size="10" fill="#ff9090">Bad Request</text>

  <!-- ========= FLUJO 2: AGENDAR SESION ========= -->
  <text x="680" y="68" text-anchor="middle" font-size="14" font-weight="bold" fill="#e8c3ff">Flujo 2: Agendar Sesión de Tarot</text>

  <ellipse cx="680" cy="100" rx="70" ry="22" fill="#7d3cae" stroke="#d4aaff" stroke-width="1.5"/>
  <text x="680" y="105" text-anchor="middle" font-size="13" fill="#fff">Cliente logueado</text>

  <line x1="680" y1="122" x2="680" y2="148" stroke="#d4aaff" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="580" y="148" width="200" height="44" rx="8" fill="#2d1654" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="680" y="166" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">GET /api/tarotistas</text>
  <text x="680" y="182" text-anchor="middle" font-size="11" fill="#d4aaff">Lista tarotistas activos</text>

  <line x1="680" y1="192" x2="680" y2="218" stroke="#d4aaff" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="580" y="218" width="200" height="44" rx="8" fill="#2d1654" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="680" y="236" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">POST /api/sesiones</text>
  <text x="680" y="252" text-anchor="middle" font-size="11" fill="#d4aaff">Envía fecha, tarotista, especialidad</text>

  <line x1="680" y1="262" x2="680" y2="288" stroke="#d4aaff" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Decisión tarotista aprobado -->
  <polygon points="680,288 760,318 680,348 600,318" fill="#1f0e3d" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="680" y="322" text-anchor="middle" font-size="11" fill="#d4aaff">¿Tarotista aprobado?</text>

  <line x1="600" y1="318" x2="530" y2="318" stroke="#e06060" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="565" y="310" text-anchor="middle" font-size="11" fill="#e06060">No</text>
  <rect x="470" y="300" width="60" height="36" rx="8" fill="#3d1010" stroke="#e06060" stroke-width="1.5"/>
  <text x="500" y="319" text-anchor="middle" font-size="11" fill="#ff9090">400</text>
  <text x="500" y="333" text-anchor="middle" font-size="10" fill="#ff9090">Error</text>

  <line x1="680" y1="348" x2="680" y2="374" stroke="#60e090" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="692" y="365" font-size="11" fill="#60e090">Si</text>

  <!-- Decisión disponibilidad -->
  <polygon points="680,374 760,404 680,434 600,404" fill="#1f0e3d" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="680" y="408" text-anchor="middle" font-size="11" fill="#d4aaff">¿Horario disponible?</text>

  <line x1="600" y1="404" x2="530" y2="404" stroke="#e06060" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="565" y="396" text-anchor="middle" font-size="11" fill="#e06060">No</text>
  <rect x="470" y="386" width="60" height="36" rx="8" fill="#3d1010" stroke="#e06060" stroke-width="1.5"/>
  <text x="500" y="405" text-anchor="middle" font-size="11" fill="#ff9090">400</text>
  <text x="500" y="419" text-anchor="middle" font-size="10" fill="#ff9090">Fuera</text>

  <line x1="680" y1="434" x2="680" y2="460" stroke="#60e090" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="692" y="451" font-size="11" fill="#60e090">Si</text>

  <!-- Calcular precio -->
  <rect x="580" y="460" width="200" height="44" rx="8" fill="#2d1654" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="680" y="478" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Calcular precio</text>
  <text x="680" y="494" text-anchor="middle" font-size="11" fill="#d4aaff">precioBase × duracion / 60</text>

  <line x1="680" y1="504" x2="680" y2="530" stroke="#d4aaff" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Guardar sesion -->
  <rect x="580" y="530" width="200" height="44" rx="8" fill="#2d1654" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="680" y="548" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Guardar sesión en DB</text>
  <text x="680" y="564" text-anchor="middle" font-size="11" fill="#d4aaff">Estado: PENDIENTE</text>

  <line x1="680" y1="574" x2="680" y2="600" stroke="#d4aaff" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Tarotista confirma -->
  <polygon points="680,600 760,630 680,660 600,630" fill="#1f0e3d" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="680" y="634" text-anchor="middle" font-size="11" fill="#d4aaff">¿Tarotista confirma?</text>

  <line x1="680" y1="660" x2="680" y2="686" stroke="#60e090" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="692" y="677" font-size="11" fill="#60e090">Si</text>

  <!-- Sesion confirmada -->
  <rect x="580" y="686" width="200" height="44" rx="8" fill="#1a3d1a" stroke="#60e090" stroke-width="1.5"/>
  <text x="680" y="704" text-anchor="middle" font-size="12" font-weight="bold" fill="#60e090">Sesión CONFIRMADA</text>
  <text x="680" y="720" text-anchor="middle" font-size="11" fill="#90d090">200 OK</text>

  <!-- No confirma -->
  <line x1="760" y1="630" x2="840" y2="630" stroke="#e06060" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="800" y="622" text-anchor="middle" font-size="11" fill="#e06060">No</text>
  <rect x="840" y="612" width="120" height="36" rx="8" fill="#3d1010" stroke="#e06060" stroke-width="1.5"/>
  <text x="900" y="631" text-anchor="middle" font-size="11" fill="#ff9090">Sesión RECHAZADA</text>
  <text x="900" y="645" text-anchor="middle" font-size="10" fill="#ff9090">o CANCELADA</text>

  <!-- Fin -->
  <ellipse cx="200" cy="770" rx="70" ry="22" fill="#7d3cae" stroke="#d4aaff" stroke-width="1.5"/>
  <text x="200" y="775" text-anchor="middle" font-size="13" fill="#fff">Fin</text>
  <ellipse cx="680" cy="770" rx="70" ry="22" fill="#7d3cae" stroke="#d4aaff" stroke-width="1.5"/>
  <text x="680" y="775" text-anchor="middle" font-size="13" fill="#fff">Fin</text>
  <line x1="200" y1="714" x2="200" y2="748" stroke="#d4aaff" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="680" y1="730" x2="680" y2="748" stroke="#d4aaff" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Leyenda -->
  <rect x="950" y="700" width="230" height="160" rx="8" fill="#1f0e3d" stroke="#7d3cae" stroke-width="1.5"/>
  <text x="1065" y="724" text-anchor="middle" font-size="13" font-weight="bold" fill="#d4aaff">Leyenda</text>
  <ellipse cx="975" cy="750" rx="16" ry="10" fill="#7d3cae" stroke="#d4aaff" stroke-width="1"/>
  <text x="1000" y="754" font-size="12" fill="#e8c3ff">Inicio / Fin</text>
  <rect x="960" y="768" width="30" height="18" rx="4" fill="#2d1654" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="1000" y="780" font-size="12" fill="#e8c3ff">Proceso</text>
  <polygon points="975,800 1000,812 975,824 950,812" fill="#1f0e3d" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="1010" y="816" font-size="12" fill="#e8c3ff">Decisión</text>
  <rect x="960" y="832" width="30" height="18" rx="4" fill="#1a3d1a" stroke="#60e090" stroke-width="1.5"/>
  <text x="1000" y="844" font-size="12" fill="#90d090">Éxito (2xx)</text>
  <rect x="960" y="852" width="30" height="8" rx="4" fill="#3d1010" stroke="#e06060" stroke-width="1.5"/>
  <text x="1000" y="860" font-size="12" fill="#ff9090">Error (4xx)</text>

  <!-- Marcador flecha -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#d4aaff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
</svg>
