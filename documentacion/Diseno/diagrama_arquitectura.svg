<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" width="1200" height="820" font-family="Arial, sans-serif">
  <rect width="1200" height="820" fill="#1a0a2e"/>

  <text x="600" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#d4aaff">Arquitectura de Tecnologías — ConectaTarot</text>

  <!-- ===== CAPA CLIENTE ===== -->
  <rect x="30" y="60" width="1140" height="120" rx="12" fill="#1f0e3d" stroke="#9b59b6" stroke-width="2"/>
  <text x="50" y="84" font-size="13" font-weight="bold" fill="#e8c3ff">Capa de Presentación (Frontend)</text>

  <!-- Angular -->
  <rect x="60" y="92" width="200" height="70" rx="8" fill="#2d1654" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="160" y="116" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Angular 17</text>
  <text x="160" y="136" text-anchor="middle" font-size="12" fill="#d4aaff">Single Page Application</text>
  <text x="160" y="152" text-anchor="middle" font-size="12" fill="#a080c0">localhost:4200</text>

  <!-- TypeScript -->
  <rect x="290" y="92" width="200" height="70" rx="8" fill="#2d1654" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="390" y="116" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">TypeScript</text>
  <text x="390" y="136" text-anchor="middle" font-size="12" fill="#d4aaff">Lenguaje principal</text>
  <text x="390" y="152" text-anchor="middle" font-size="12" fill="#a080c0">Tipado estático</text>

  <!-- Node / npm -->
  <rect x="520" y="92" width="200" height="70" rx="8" fill="#2d1654" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="620" y="116" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Node.js / npm</text>
  <text x="620" y="136" text-anchor="middle" font-size="12" fill="#d4aaff">Gestor de dependencias</text>
  <text x="620" y="152" text-anchor="middle" font-size="12" fill="#a080c0">Build y servidor dev</text>

  <!-- Herramientas frontend -->
  <rect x="750" y="92" width="180" height="70" rx="8" fill="#2d1654" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="840" y="116" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Thunder Client</text>
  <text x="840" y="136" text-anchor="middle" font-size="12" fill="#d4aaff">Testing de API</text>
  <text x="840" y="152" text-anchor="middle" font-size="12" fill="#a080c0">VS Code Extension</text>

  <!-- Figma -->
  <rect x="950" y="92" width="180" height="70" rx="8" fill="#2d1654" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="1040" y="116" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Figma</text>
  <text x="1040" y="136" text-anchor="middle" font-size="12" fill="#d4aaff">Diseño UX/UI</text>
  <text x="1040" y="152" text-anchor="middle" font-size="12" fill="#a080c0">Prototipos</text>

  <!-- Flechas Frontend a Backend -->
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#c080ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <line x1="600" y1="180" x2="600" y2="222" stroke="#c080ff" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="610" y="205" font-size="12" fill="#c080ff">HTTP REST / JSON</text>

  <!-- ===== CAPA BACKEND ===== -->
  <rect x="30" y="222" width="1140" height="180" rx="12" fill="#0e1f0e" stroke="#2d8a4e" stroke-width="2"/>
  <text x="50" y="246" font-size="13" font-weight="bold" fill="#80e8a0">Capa de Lógica de Negocio (Backend)</text>

  <!-- Spring Boot -->
  <rect x="60" y="256" width="220" height="126" rx="8" fill="#122212" stroke="#2d8a4e" stroke-width="1.5"/>
  <text x="170" y="280" text-anchor="middle" font-size="14" font-weight="bold" fill="#80e8a0">Spring Boot 3</text>
  <text x="170" y="300" text-anchor="middle" font-size="12" fill="#60c080">Java 21 — Maven</text>
  <text x="170" y="318" text-anchor="middle" font-size="12" fill="#60c080">Patrón MVC</text>
  <text x="170" y="336" text-anchor="middle" font-size="12" fill="#60c080">REST API</text>
  <text x="170" y="354" text-anchor="middle" font-size="12" fill="#a0a0a0">localhost:8080</text>
  <text x="170" y="372" text-anchor="middle" font-size="12" fill="#a0a0a0">./mvnw spring-boot:run</text>

  <!-- Spring Security -->
  <rect x="310" y="256" width="200" height="126" rx="8" fill="#122212" stroke="#2d8a4e" stroke-width="1.5"/>
  <text x="410" y="280" text-anchor="middle" font-size="14" font-weight="bold" fill="#80e8a0">Spring Security</text>
  <text x="410" y="300" text-anchor="middle" font-size="12" fill="#60c080">JWT Tokens</text>
  <text x="410" y="318" text-anchor="middle" font-size="12" fill="#60c080">BCrypt hashing</text>
  <text x="410" y="336" text-anchor="middle" font-size="12" fill="#60c080">Control de roles</text>
  <text x="410" y="354" text-anchor="middle" font-size="12" fill="#a0a0a0">ADMIN / CLIENTE</text>
  <text x="410" y="372" text-anchor="middle" font-size="12" fill="#a0a0a0">TAROTISTA</text>

  <!-- Hibernate / JPA -->
  <rect x="540" y="256" width="200" height="126" rx="8" fill="#122212" stroke="#2d8a4e" stroke-width="1.5"/>
  <text x="640" y="280" text-anchor="middle" font-size="14" font-weight="bold" fill="#80e8a0">Hibernate / JPA</text>
  <text x="640" y="300" text-anchor="middle" font-size="12" fill="#60c080">ORM — entidades Java</text>
  <text x="640" y="318" text-anchor="middle" font-size="12" fill="#60c080">Spring Data JPA</text>
  <text x="640" y="336" text-anchor="middle" font-size="12" fill="#60c080">Repositorios</text>
  <text x="640" y="354" text-anchor="middle" font-size="12" fill="#a0a0a0">ddl-auto: update</text>
  <text x="640" y="372" text-anchor="middle" font-size="12" fill="#a0a0a0">7 entidades mapeadas</text>

  <!-- Controllers -->
  <rect x="770" y="256" width="180" height="126" rx="8" fill="#122212" stroke="#2d8a4e" stroke-width="1.5"/>
  <text x="860" y="280" text-anchor="middle" font-size="14" font-weight="bold" fill="#80e8a0">Controllers</text>
  <text x="860" y="300" text-anchor="middle" font-size="12" fill="#60c080">AuthController</text>
  <text x="860" y="318" text-anchor="middle" font-size="12" fill="#60c080">UsuarioController</text>
  <text x="860" y="336" text-anchor="middle" font-size="12" fill="#60c080">TarotistaController</text>
  <text x="860" y="354" text-anchor="middle" font-size="12" fill="#60c080">SesionController</text>
  <text x="860" y="372" text-anchor="middle" font-size="12" fill="#60c080">EspecialidadController</text>

  <!-- Webpay -->
  <rect x="978" y="256" width="162" height="126" rx="8" fill="#122212" stroke="#2d8a4e" stroke-width="1.5"/>
  <text x="1059" y="280" text-anchor="middle" font-size="14" font-weight="bold" fill="#80e8a0">Webpay</text>
  <text x="1059" y="300" text-anchor="middle" font-size="12" fill="#60c080">SDK integración</text>
  <text x="1059" y="318" text-anchor="middle" font-size="12" fill="#60c080">Pasarela de pago</text>
  <text x="1059" y="336" text-anchor="middle" font-size="12" fill="#60c080">PCI-DSS</text>
  <text x="1059" y="354" text-anchor="middle" font-size="12" fill="#a0a0a0">Chile — Transbank</text>

  <!-- Flechas Backend a DB -->
  <line x1="600" y1="402" x2="600" y2="444" stroke="#c080ff" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="610" y="427" font-size="12" fill="#c080ff">JDBC / MySQL Connector</text>

  <!-- ===== CAPA DB ===== -->
  <rect x="30" y="444" width="1140" height="110" rx="12" fill="#1a1000" stroke="#c08000" stroke-width="2"/>
  <text x="50" y="468" font-size="13" font-weight="bold" fill="#f0c060">Capa de Persistencia (Base de Datos)</text>

  <!-- MySQL -->
  <rect x="200" y="476" width="240" height="60" rx="8" fill="#2a1e00" stroke="#c08000" stroke-width="1.5"/>
  <text x="320" y="500" text-anchor="middle" font-size="14" font-weight="bold" fill="#f0c060">MySQL 8</text>
  <text x="320" y="520" text-anchor="middle" font-size="12" fill="#c0a040">Puerto 3306 — Base de datos: mi_app</text>
  <text x="320" y="538" text-anchor="middle" font-size="11" fill="#a08030">Usuario: conectatarot</text>

  <!-- Tablas -->
  <rect x="480" y="476" width="680" height="60" rx="8" fill="#2a1e00" stroke="#c08000" stroke-width="1.5"/>
  <text x="820" y="500" text-anchor="middle" font-size="13" font-weight="bold" fill="#f0c060">Tablas principales</text>
  <text x="820" y="522" text-anchor="middle" font-size="12" fill="#c0a040">usuario · rol · tarotista · especialidad · tarotista_especialidad · sesion · disponibilidad_tarotista</text>
  <text x="820" y="540" text-anchor="middle" font-size="11" fill="#a08030">7 tablas — ddl-auto: update (autogenerado por Hibernate)</text>

  <!-- ===== CAPA SEGURIDAD ===== -->
  <rect x="30" y="580" width="1140" height="110" rx="12" fill="#200a0a" stroke="#8a2020" stroke-width="2"/>
  <text x="50" y="604" font-size="13" font-weight="bold" fill="#e08080">Seguridad Transversal</text>

  <rect x="60" y="614" width="200" height="58" rx="8" fill="#3d1010" stroke="#8a2020" stroke-width="1.5"/>
  <text x="160" y="636" text-anchor="middle" font-size="13" font-weight="bold" fill="#ff9090">JWT</text>
  <text x="160" y="654" text-anchor="middle" font-size="11" fill="#e07070">Tokens de sesión</text>
  <text x="160" y="668" text-anchor="middle" font-size="11" fill="#a05050">Autenticación stateless</text>

  <rect x="290" y="614" width="200" height="58" rx="8" fill="#3d1010" stroke="#8a2020" stroke-width="1.5"/>
  <text x="390" y="636" text-anchor="middle" font-size="13" font-weight="bold" fill="#ff9090">BCrypt</text>
  <text x="390" y="654" text-anchor="middle" font-size="11" fill="#e07070">Hash de contraseñas</text>
  <text x="390" y="668" text-anchor="middle" font-size="11" fill="#a05050">Ingeniería inversa imposible</text>

  <rect x="520" y="614" width="200" height="58" rx="8" fill="#3d1010" stroke="#8a2020" stroke-width="1.5"/>
  <text x="620" y="636" text-anchor="middle" font-size="13" font-weight="bold" fill="#ff9090">CORS</text>
  <text x="620" y="654" text-anchor="middle" font-size="11" fill="#e07070">Cabeceras HTTP</text>
  <text x="620" y="668" text-anchor="middle" font-size="11" fill="#a05050">CrossOrigin: * (dev)</text>

  <rect x="750" y="614" width="200" height="58" rx="8" fill="#3d1010" stroke="#8a2020" stroke-width="1.5"/>
  <text x="850" y="636" text-anchor="middle" font-size="13" font-weight="bold" fill="#ff9090">Control de roles</text>
  <text x="850" y="654" text-anchor="middle" font-size="11" fill="#e07070">@PreAuthorize</text>
  <text x="850" y="668" text-anchor="middle" font-size="11" fill="#a05050">hasRole('ADMIN')</text>

  <rect x="980" y="614" width="160" height="58" rx="8" fill="#3d1010" stroke="#8a2020" stroke-width="1.5"/>
  <text x="1060" y="636" text-anchor="middle" font-size="13" font-weight="bold" fill="#ff9090">Blacklist</text>
  <text x="1060" y="654" text-anchor="middle" font-size="11" fill="#e07070">TokenBlacklist</text>
  <text x="1060" y="668" text-anchor="middle" font-size="11" fill="#a05050">Logout invalidación</text>

  <!-- ===== HERRAMIENTAS DEVOPS ===== -->
  <rect x="30" y="716" width="1140" height="80" rx="12" fill="#0a0a1a" stroke="#5050a0" stroke-width="2"/>
  <text x="50" y="740" font-size="13" font-weight="bold" fill="#a0a0ff">Herramientas y DevOps</text>

  <text x="160" y="768" text-anchor="middle" font-size="13" fill="#8080d0">GitHub</text>
  <text x="160" y="784" text-anchor="middle" font-size="11" fill="#6060a0">Control de versiones</text>

  <text x="360" y="768" text-anchor="middle" font-size="13" fill="#8080d0">VS Code</text>
  <text x="360" y="784" text-anchor="middle" font-size="11" fill="#6060a0">IDE principal</text>

  <text x="560" y="768" text-anchor="middle" font-size="13" fill="#8080d0">Postman</text>
  <text x="560" y="784" text-anchor="middle" font-size="11" fill="#6060a0">Pruebas de API</text>

  <text x="760" y="768" text-anchor="middle" font-size="13" fill="#8080d0">VMware (Ubuntu)</text>
  <text x="760" y="784" text-anchor="middle" font-size="11" fill="#6060a0">Entorno de desarrollo</text>

  <text x="960" y="768" text-anchor="middle" font-size="13" fill="#8080d0">Scrum / Jira</text>
  <text x="960" y="784" text-anchor="middle" font-size="11" fill="#6060a0">Metodología ágil</text>
</svg>
